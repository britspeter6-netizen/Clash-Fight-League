<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />

  <title>Contact — Clash Fight League</title>
  <link rel="stylesheet" href="../css/style.css" />
</head>
<body>

  <nav class="navbar">
    <div class="logo">
      <img src="../assets/images/logo.png" alt="Clash Fight League" />
    </div>
    <ul class="nav-links">
      <li><a href="../index.html">Home</a></li>
      <li><a href="events.html">Events</a></li>
      <li><a href="fighters.html">Fighters</a></li>
      <li><a href="about.html">About</a></li>
      <li><a href="contact.html">Contact</a></li>
    </ul>
  </nav>

  <section class="page-header">
    <h1>Contact</h1>
  </section>

  <section class="contact-section">
    <div class="container">
      <p>Want to fight, sponsor, or partner with Clash Fight League? Get in touch.</p>
      <form class="contact-form" action="#" method="POST">
        <input type="text" name="name" placeholder="Your Name" required />
        <input type="email" name="email" placeholder="Your Email" required />
        <textarea name="message" rows="5" placeholder="Your message..." required></textarea>
        <button type="submit" class="btn-primary">Send Message</button>
      </form>
    </div>
  </section>

  <footer class="footer">
    <p>&copy; 2026 Clash Fight League. All rights reserved.</p>
  </footer>

  <script src="../js/main.js"></script>
</body>
</html>
