<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 320" width="520" height="320">
  <defs>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="3" dy="3" stdDeviation="2" flood-color="#000" flood-opacity="0.9"/>
    </filter>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="0" stdDeviation="4" flood-color="#fff" flood-opacity="0.6"/>
    </filter>
    <linearGradient id="yellowGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#FFD700"/>
      <stop offset="50%" style="stop-color:#FFA500"/>
      <stop offset="100%" style="stop-color:#FF6B00"/>
    </linearGradient>
    <linearGradient id="redGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#FF2200"/>
      <stop offset="60%" style="stop-color:#CC1100"/>
      <stop offset="100%" style="stop-color:#880000"/>
    </linearGradient>
    <!-- Jagged border clip path -->
    <clipPath id="jagged">
      <polygon points="
        30,10 60,0 90,12 120,2 150,14 180,0 210,10 240,2 270,12 300,0 330,10 360,2 390,12 420,0 450,10 480,2 510,14
        520,30 518,60 520,90 515,120 520,150 516,180 520,210 515,240 520,270 510,300 520,320
        490,310 460,320 430,308 400,320 370,310 340,320 310,308 280,320 250,310 220,320 190,308 160,320 130,310 100,320 70,310 40,320 10,308 0,320
        0,290 4,260 0,230 5,200 0,170 4,140 0,110 5,80 0,50 10,20
      "/>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect width="520" height="320" fill="#0a0a0a"/>

  <!-- Jagged outer border strokes -->
  <polygon points="
    30,10 60,0 90,12 120,2 150,14 180,0 210,10 240,2 270,12 300,0 330,10 360,2 390,12 420,0 450,10 480,2 510,14
    520,30 518,60 520,90 515,120 520,150 516,180 520,210 515,240 520,270 510,300 520,320
    490,310 460,320 430,308 400,320 370,310 340,320 310,308 280,320 250,310 220,320 190,308 160,320 130,310 100,320 70,310 40,320 10,308 0,320
    0,290 4,260 0,230 5,200 0,170 4,140 0,110 5,80 0,50 10,20
  " fill="none" stroke="#ffffff" stroke-width="5"/>

  <polygon points="
    34,16 62,6 90,17 120,8 150,19 180,7 210,16 240,8 268,17 300,7 330,16 360,8 390,17 420,7 450,16 478,8 506,18
    514,34 512,62 514,90 509,120 514,150 510,178 514,210 509,238 514,268 505,294 514,314
    487,305 458,314 430,303 400,314 370,305 342,314 312,303 280,314 250,305 222,314 192,303 162,314 132,305 100,314 72,305 42,314 14,303 6,314
    6,287 10,258 6,230 11,200 6,172 10,142 6,112 11,82 6,52 14,26
  " fill="none" stroke="#ff2200" stroke-width="3"/>

  <!-- NEXT - red chunky text -->
  <text x="260" y="148"
    font-family="'Arial Black', 'Impact', sans-serif"
    font-weight="900"
    font-size="112"
    text-anchor="middle"
    letter-spacing="-2"
    fill="none"
    stroke="#000"
    stroke-width="14"
    filter="url(#shadow)">NEXT</text>
  <text x="260" y="148"
    font-family="'Arial Black', 'Impact', sans-serif"
    font-weight="900"
    font-size="112"
    text-anchor="middle"
    letter-spacing="-2"
    fill="none"
    stroke="#ffffff"
    stroke-width="8">NEXT</text>
  <text x="260" y="148"
    font-family="'Arial Black', 'Impact', sans-serif"
    font-weight="900"
    font-size="112"
    text-anchor="middle"
    letter-spacing="-2"
    fill="url(#redGrad)">NEXT</text>

  <!-- LEVEL - yellow/gold chunky text -->
  <text x="242" y="256"
    font-family="'Arial Black', 'Impact', sans-serif"
    font-weight="900"
    font-size="112"
    text-anchor="middle"
    letter-spacing="-2"
    fill="none"
    stroke="#000"
    stroke-width="14"
    filter="url(#shadow)">LEVEL</text>
  <text x="242" y="256"
    font-family="'Arial Black', 'Impact', sans-serif"
    font-weight="900"
    font-size="112"
    text-anchor="middle"
    letter-spacing="-2"
    fill="none"
    stroke="#ffffff"
    stroke-width="8">LEVEL</text>
  <text x="242" y="256"
    font-family="'Arial Black', 'Impact', sans-serif"
    font-weight="900"
    font-size="112"
    text-anchor="middle"
    letter-spacing="-2"
    fill="url(#yellowGrad)">LEVEL</text>

  <!-- INC badge - green with house bracket -->
  <g transform="translate(388, 196)">
    <!-- House/bracket shape in green -->
    <polygon points="0,0 80,0 80,60 40,80 0,60" fill="#1a8c2a" stroke="#fff" stroke-width="3"/>
    <polygon points="4,4 76,4 76,58 40,74 4,58" fill="none" stroke="#0d5c1a" stroke-width="2"/>
    <text x="40" y="44"
      font-family="'Arial Black', 'Impact', sans-serif"
      font-weight="900"
      font-size="28"
      text-anchor="middle"
      fill="#fff"
      letter-spacing="1">INC</text>
  </g>
</svg>
